name: Publish to PyPI

# Triggered by creating a GitHub Release.
#
# Setup (one-time): configure trusted publishing at
#   https://pypi.org/manage/account/publishing/
# with:
#   PyPI project: hwpkit
#   Owner:        psychofict
#   Repo:         hwpkit
#   Workflow:     publish.yml
#   Environment:  pypi

on:
  release:
    types: [published]

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: python -m pip install --upgrade pip build
      - name: Build
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hwpkit
    permissions:
      # Required for trusted publishing via OIDC. No secrets needed.
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
